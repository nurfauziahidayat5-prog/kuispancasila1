<!DOCTYPE html>
<html lang="id">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Wawasan Pancasila</title>
    <style>
        /* Gaya Visual Profesional (Tema Biru Tua & Emas) */
        :root {
            --primary: #002D5B;
            --accent: #C8A45D; 
            --bg-color: #F8F9FA;
            --text-main: #333333;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border-top: 6px solid var(--primary);
        }

        h2 {
            color: var(--primary);
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Form Input Nama */
        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Tombol */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--accent);
        }

        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* Opsi Jawaban Kuis */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .option-btn {
            background-color: #F1F3F5;
            border: 2px solid #E9ECEF;
            padding: 18px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: var(--accent);
            background-color: #FDFBF7;
        }

        /* Tampilan Skor */
        .score-circle {
            width: 150px;
            height: 150px;
            border: 8px solid var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            margin: 30px auto;
        }

        #progress-text {
            font-weight: bold;
            color: var(--accent);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="welcome-screen">
            <h2>Assessment Wawasan Pancasila</h2>
            <p class="subtitle">Silakan masukkan identitas Anda sebelum memulai ujian. Pastikan koneksi internet Anda stabil.</p>
            
            <div class="input-group">
                <label for="userName">Nama Lengkap</label>
                <input type="text" id="userName" placeholder="Ketik nama Anda di sini..." autocomplete="off">
            </div>
            
            <button id="start-btn" class="btn" onclick="startQuiz()" disabled>Memuat Soal...</button>
        </div>

        <div id="quiz-screen" style="display: none;">
            <span id="progress-text">Soal 1 dari 5</span>
            <h2 id="question-text" style="font-size: 22px; line-height: 1.4;">Memuat pertanyaan...</h2>
            
            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="result-screen" style="display: none; text-align: center;">
            <h2>Assessment Selesai</h2>
            <p class="subtitle" id="result-greeting" style="font-size: 18px; color: var(--primary); font-weight: bold;">Terima kasih, [Nama]</p>
            
            <p style="margin-bottom: 0;">Berikut adalah skor akhir Anda:</p>
            <div class="score-circle" id="final-score">0</div>
            
            <button class="btn" onclick="location.reload()" style="margin-top: 20px;">Kembali ke Awal</button>
        </div>

    </div>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let participantName = "";

        // LINK WEB APP GOOGLE APPS SCRIPT ANDA
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_v9GiVbwlDo0Kz1r7s3f5sqxkQLoG-_oNofA2cu3dcsNhCWxviHXH4feqD_LZ4k4r/exec';

        window.onload = function() {
            // Menggunakan FETCH API untuk mengambil data dari Google Apps Script
            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    quizData = data;
                    const startBtn = document.getElementById('start-btn');
                    startBtn.disabled = false;
                    startBtn.innerText = "Mulai Assessment";
                })
                .catch(error => {
                    console.error('Terjadi kesalahan:', error);
                    document.getElementById('start-btn').innerText = "Gagal Memuat Soal";
                });
        };

        function startQuiz() {
            const nameInput = document.getElementById('userName').value.trim();
            
            if (nameInput === "") {
                alert("Mohon isi nama lengkap Anda terlebih dahulu!");
                return;
            }

            participantName = nameInput;
            
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            showQuestion();
        }

        function showQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            
            document.getElementById('progress-text').innerText = `Soal ${currentQuestionIndex + 1} dari ${quizData.length}`;
            document.getElementById('question-text').innerText = currentQ.soal;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; 

            currentQ.opsi.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(opt, currentQ.kunci);
                optionsContainer.appendChild(btn);
            });
        }

        function selectAnswer(selectedOption, correctAnswer) {
            if (selectedOption === correctAnswer) {
                score += 20; 
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < quizData.length) {
                showQuestion(); 
            } else {
                showResult(); 
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('result-greeting').innerText = `Terima kasih, ${participantName}!`;
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
