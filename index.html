<!DOCTYPE html>
<html lang="id">
<head>
  <!-- [CSS Anda Tetap Sama Seperti Yang Anda Berikan - Saya Potong Untuk Efisiensi] -->
  <style>
    /* Gunakan CSS asli Anda di sini */
    :root { --primary-dark: #4c2e35; --sidebar-bg: #fae1e6; --sidebar-hover: #f3c1cb; --accent-pink: #f0a3b3; --active-highlight: #d47285; --bg-main: #fff5f6; --text-main: #2e1f22; --text-muted: #8c7377; --success: #6ba67e; --warning: #e0a96d; --danger: #d9534f; }
    /* ... (Silakan masukkan CSS asli Anda di sini) ... */
    body { display: flex; height: 100vh; background-color: var(--bg-main); overflow: hidden; font-family: 'Inter', sans-serif; }
    .sidebar { width: 320px; background-color: var(--sidebar-bg); }
    .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; }
    .content-card { display: none; padding: 40px; }
    .content-card.active { display: block; }
    .question-box { background: white; padding: 20px; margin: 10px 0; border: 1px solid #ddd; }
  </style>
</head>
<body>

  <!-- [Sidebar & HTML Struktur Anda Tetap Sama] -->
  <nav class="sidebar">
      <div class="sidebar-profile"><h2>Nurfauzia Hidayat</h2></div>
      <div class="sidebar-scroll">
          <button class="btn-dashboard-portal" onclick="openPortalRoot()">Dashboard</button>
          <div class="menu-category">Mata Kuliah</div>
          <ul id="drop-mk" class="dropdown-container" style="display:block;"></ul>
          <div class="menu-category">Kuis</div>
          <ul id="drop-kuis" class="dropdown-container" style="display:block;"></ul>
      </div>
  </nav>

  <div class="main-wrapper">
    <main class="main-content" id="app">
        <!-- Tab Materi & Kuis Akan Dimuat Disini -->
        <div id="materi-tab" class="content-card"><h1>Materi</h1><div id="materi-isi"></div></div>
        <div id="kuis-tab" class="content-card"><h1>Kuis</h1><div id="soal-isi"></div></div>
    </main>
  </div>

  <script>
    // DATA DATABASE MATA KULIAH
    const dataMataKuliah = [
      { 
        nama: "Pancasila", 
        materi: "Pancasila sebagai dasar negara dan pandangan hidup bangsa Indonesia.",
        soal: [
          { q: "Sila ke-3 berbunyi?", o: ["Persatuan Indonesia", "Keadilan Sosial", "Ketuhanan", "Kemanusiaan"], k: "A" },
          { q: "Lambang sila ke-1?", o: ["Bintang", "Rantai", "Pohon Beringin", "Padi Kapas"], k: "A" },
          { q: "Tahun lahir Pancasila?", o: ["1945", "1946", "1947", "1948"], k: "A" },
          { q: "Siapa pengusul nama Pancasila?", o: ["Soekarno", "Hatta", "Yamin", "Supomo"], k: "A" },
          { q: "Sila ke-5 dilambangkan?", o: ["Padi Kapas", "Rantai", "Kepala Banteng", "Bintang"], k: "A" }
        ]
      },
      { 
        nama: "Matematika", 
        materi: "Studi angka dan logika. 1+1=2.",
        soal: [
          { q: "Hasil dari 5x5?", o: ["25", "20", "30", "15"], k: "A" },
          { q: "Akar 9?", o: ["3", "2", "4", "5"], k: "A" },
          { q: "Sisi segitiga?", o: ["3", "4", "2", "5"], k: "A" },
          { q: "Hasil 10/2?", o: ["5", "2", "4", "6"], k: "A" },
          { q: "Sudut siku-siku?", o: ["90", "45", "180", "360"], k: "A" }
        ]
      },
      { 
        nama: "Bahasa Indonesia", 
        materi: "Tata bahasa, ejaan, dan literasi Indonesia.",
        soal: [
          { q: "Ibu kota Indonesia?", o: ["Jakarta", "Bandung", "Surabaya", "Medan"], k: "A" },
          { q: "Antonim besar?", o: ["Kecil", "Panjang", "Lebar", "Tinggi"], k: "A" },
          { q: "Tanda baca di akhir kalimat?", o: [".", ",", "!", "?"], k: "A" },
          { q: "Kata dasar 'berlari'?", o: ["Lari", "Ber", "Larian", "Berla"], k: "A" },
          { q: "Apa itu KBBI?", o: ["Kamus", "Buku", "Jurnal", "Majalah"], k: "A" }
        ]
      },
      { 
        nama: "Bahasa Inggris", 
        materi: "Basic English grammar and vocabulary.",
        soal: [
          { q: "English of 'Makan'?", o: ["Eat", "Drink", "Sleep", "Run"], k: "A" },
          { q: "I ... a student.", o: ["Am", "Is", "Are", "Be"], k: "A" },
          { q: "Opposite of 'Big'?", o: ["Small", "Short", "Thin", "Fat"], k: "A" },
          { q: "Color of the sky?", o: ["Blue", "Red", "Green", "Yellow"], k: "A" },
          { q: "How are you?", o: ["I'm fine", "Yes", "No", "Thanks"], k: "A" }
        ]
      },
      { 
        nama: "Pendidikan Agama", 
        materi: "Etika, moral, dan kerohanian.",
        soal: [
          { q: "Kitab suci umat Islam?", o: ["Al-Qur'an", "Injil", "Taurat", "Wedha"], k: "A" },
          { q: "Sifat wajib Tuhan?", o: ["Wujud", "Mati", "Lapar", "Haus"], k: "A" },
          { q: "Tujuan ibadah?", o: ["Ibadah", "Main", "Bekerja", "Tidur"], k: "A" },
          { q: "Berbuat baik disebut?", o: ["Amal", "Dosa", "Buruk", "Jahat"], k: "A" },
          { q: "Ciptaan Tuhan?", o: ["Alam", "Robot", "Imajinasi", "Mimpi"], k: "A" }
        ]
      },
      { 
        nama: "Informatika", 
        materi: "Komputer, perangkat lunak, dan internet.",
        soal: [
          { q: "CPU singkatan dari?", o: ["Central Processing Unit", "Computer Process Unit", "Core Power Unit", "Central Power Unit"], k: "A" },
          { q: "Alat penunjuk di PC?", o: ["Mouse", "Keyboard", "Printer", "Monitor"], k: "A" },
          { q: "Apa itu RAM?", o: ["Memory", "Storage", "Processor", "Monitor"], k: "A" },
          { q: "Website untuk browsing?", o: ["Chrome", "Excel", "Word", "Paint"], k: "A" },
          { q: "Otak komputer?", o: ["Processor", "Harddisk", "Casing", "Kabel"], k: "A" }
        ]
      }
    ];

    // Fungsi Render UI (Memasukkan data ke menu)
    function init() {
      const mkMenu = document.getElementById('drop-mk');
      const kuisMenu = document.getElementById('drop-kuis');
      dataMataKuliah.forEach((mk, i) => {
        mkMenu.innerHTML += `<li class="dropdown-item" onclick="bukaMateri(${i})">📘 ${mk.nama}</li>`;
        kuisMenu.innerHTML += `<li class="dropdown-item" onclick="bukaKuis(${i})">📝 ${mk.nama}</li>`;
      });
    }

    function bukaMateri(i) {
      document.getElementById('materi-tab').classList.add('active');
      document.getElementById('kuis-tab').classList.remove('active');
      document.getElementById('materi-isi').innerHTML = `<p>${dataMataKuliah[i].materi}</p>`;
    }

    function bukaKuis(i) {
      document.getElementById('materi-tab').classList.remove('active');
      document.getElementById('kuis-tab').classList.add('active');
      let html = `<h3>Kuis ${dataMataKuliah[i].nama}</h3>`;
      dataMataKuliah[i].soal.forEach((s, idx) => {
        html += `<div class="question-box">
          <p>${s.q}</p>
          ${s.o.map(opt => `<button onclick="cek('${s.k}', '${opt[0]}')">${opt}</button>`).join('')}
        </div>`;
      });
      document.getElementById('soal-isi').innerHTML = html;
    }
    
    function cek(kunci, jawab) {
        alert(kunci == jawab ? "Benar!" : "Salah!");
    }

    window.onload = init;
  </script>
</body>
</html>
